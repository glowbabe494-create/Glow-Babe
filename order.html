<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GlowBabe Order</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="order-form">
    <h2>Place Your Order</h2>
    <form id="orderForm">
      <label>Email:</label>
      <input type="email" id="email" required><br>

      <label>
        <input type="checkbox" id="newsletter"> Email me with news and offers
      </label><br>

      <label>Delivery Country:</label>
      <input type="text" value="Pakistan" disabled><br>

      <label>First Name:</label>
      <input type="text" id="fname" required><br>

      <label>Last Name:</label>
      <input type="text" id="lname" required><br>

      <label>Address:</label>
      <input type="text" id="address" required><br>

      <label>City:</label>
      <input type="text" id="city" required><br>

      <label>Postal Code (optional):</label>
      <input type="text" id="postal"><br>

      <label>Phone:</label>
      <input type="text" id="phone" required><br>

      <button type="button" onclick="sendOrder()">Send to WhatsApp</button>
    </form>
  </section>

  <script>
    function sendOrder() {
      let email = document.getElementById("email").value;
      let newsletter = document.getElementById("newsletter").checked ? "Yes" : "No";
      let fname = document.getElementById("fname").value;
      let lname = document.getElementById("lname").value;
      let address = document.getElementById("address").value;
      let city = document.getElementById("city").value;
      let postal = document.getElementById("postal").value;
      let phone = document.getElementById("phone").value;

      let orderText =
        "New Order Details:%0A" +
        "Email: " + email + "%0A" +
        "Newsletter: " + newsletter + "%0A" +
        "Name: " + fname + " " + lname + "%0A" +
        "Address: " + address + ", " + city + "%0A" +
        "Postal: " + postal + "%0A" +
        "Phone: " + phone;

      let whatsappUrl = "https://wa.me/923146604294?text=" + orderText;
      window.open(whatsappUrl, "_blank");
    }
  </script>
</body>
</html>
