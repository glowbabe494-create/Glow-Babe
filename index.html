<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlowBabe Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header>
    <h1>GlowBabe</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Shop</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <!-- Hero Banner -->
  <section class="hero">
    <img src="assets/banner.jpg" alt="Banner">
    <h2>Welcome to GlowBabe</h2>
    <p>Luxury beauty & accessories at your fingertips</p>
    <button>Shop Now</button>
  </section>

  <!-- Products -->
  <section class="products">
    <div class="product">
      <img src="assets/lipstick.jpg" alt="Lipstick">
      <h3>Lipstick</h3>
      <p>Rs 1200</p>
      <button onclick="addToCart('Lipstick', 1200)">Add to Cart</button>
    </div>
    <div class="product">
      <img src="assets/perfume.jpg" alt="Perfume">
      <h3>Perfume</h3>
      <p>Rs 3500</p>
      <button onclick="addToCart('Perfume', 3500)">Add to Cart</button>
    </div>
    <div class="product">
      <img src="assets/watch.jpg" alt="Watch">
      <h3>Watch</h3>
      <p>Rs 5000</p>
      <button onclick="addToCart('Watch', 5000)">Add to Cart</button>
    </div>
  </section>

  <!-- Cart -->
  <section class="cart">
    <h2>🛒 Cart</h2>
    <ul id="cart-items"></ul>
    <h3 id="total">Total: Rs 0</h3>
    <button class="checkout" onclick="checkoutWhatsApp()">Checkout via WhatsApp</button>
  </section>

  <!-- Footer -->
  <footer>
    <p>© 2026 GlowBabe. All rights reserved.</p>
    <div>
      <a href="#">Instagram</a>
      <a href="#">Facebook</a>
      <a href="#">WhatsApp</a>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
