<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlowBabe Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header>
    <h1>GlowBabe</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Shop</a>
      <a href="#">Contact</a>
      <div class="cart-icon" onclick="toggleCart(true)">
        🛒 <span id="cart-count">0</span>
      </div>
    </nav>
  </header>

  <!-- Products -->
  <section class="products">
    <div class="product">
      <img src="https://via.placeholder.com/200x200.png?text=Lipstick" alt="Lipstick">
      <h3>Lipstick</h3>
      <p>Rs 1200</p>
      <button onclick="addToCart('Lipstick', 1200)">Add to Cart</button>
    </div>
    <div class="product">
      <img src="assets/perfume.jpg" alt="Perfume">
      <h3>Perfume</h3>
      <p>Rs 3500</p>
      <button onclick="addToCart('Perfume', 3500)">Add to Cart</button>
    </div>
    <div class="product">
      <img src="assets/watch.jpg" alt="Watch">
      <h3>Watch</h3>
      <p>Rs 5000</p>
      <button onclick="addToCart('Watch', 5000)">Add to Cart</button>
    </div>
  </section>

  <!-- Side Cart Panel -->
  <div id="cart-panel" class="cart-panel">
    <div class="cart-header">
      <h2>🛒 My Cart</h2>
      <span class="close-btn" onclick="toggleCart(false)">✖</span>
    </div>
    <ul id="cart-items"></ul>
    <h3 id="total">Total: Rs 0</h3>
    <textarea id="order-notes" placeholder="Order notes..."></textarea>
    <div class="cart-buttons">
      <button onclick="goToCart()">Go to Cart</button>
      <button onclick="checkoutWhatsApp()">Checkout</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
