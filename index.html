<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GlowBabe Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navbar -->
  <header>
    <h1 class="logo">GlowBabe</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Beauty</a>
      <a href="#">Electronics</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <h2>Premium Beauty & Electronics</h2>
    <p>Elegance meets technology — shop GlowBabe today!</p>
    <a href="https://wa.me/923001234567" class="btn">Order on WhatsApp</a>
  </section>

  <!-- Product Grid -->
  <section class="product-grid">
    <div class="product">
      <img src="lipstick.jpg" alt="Lipstick">
      <h3>GlowBabe Lipstick</h3>
      <p>Rs. 1200</p>
      <button onclick="addToCart('Lipstick', 1200)">Add to Cart</button>
    </div>
    <div class="product">
      <img src="foundation.jpg" alt="Foundation">
      <h3>GlowBabe Foundation</h3>
      <p>Rs. 2500</p>
      <button onclick="addToCart('Foundation', 2500)">Add to Cart</button>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>© 2026 GlowBabe Store | Designed with ❤️ in Lahore</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
